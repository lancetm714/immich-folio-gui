services:
  immich-folio:
    build:
      context: .
    container_name: immich-folio
    restart: unless-stopped
    ports:
      - '7211:7211'
    environment:
      - AUTH_SECRET=
      - IMMICH_API_URL=
      - IMMICH_API_KEY=
      - PUID=1026
      - PGID=100
      - ADMIN_PASSWORD=
      - SITE_TITLE=
      - SITE_SUBTITLE=
      - CACHE_TTL=300
      - RATE_LIMIT_RPM=120
    volumes:
      - ./content:/app/content
